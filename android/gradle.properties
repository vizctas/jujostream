org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# org.gradle.java.home intentionally unset -- Gradle uses JAVA_HOME env var or
# toolchain auto-detect. Do NOT hardcode a machine-specific path here
# (the previous value `/opt/homebrew/opt/openjdk@21` is macOS-only and breaks
# Windows/Linux builds). If Gradle can't find a JDK, set JAVA_HOME in your shell.
android.useAndroidX=true
android.enableJetifier=true
